  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f5; color: #333; padding: 20px; }
    h1 { font-size: 22px; margin-bottom: 16px; color: #e60023; }

    .copy-block {
      background: #fff; border-radius: 12px; padding: 16px 20px;
      margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .copy-block label { font-size: 12px; color: #999; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .copy-row { display: flex; gap: 10px; align-items: center; }
    .copy-text {
      flex: 1; font-size: 14px; background: #f8f8f8;
      border: 1px solid #ddd; border-radius: 8px;
      padding: 10px 12px; color: #333; word-break: break-all;
    }
    .btn-copy {
      background: #e60023; color: #fff; border: none;
      border-radius: 8px; padding: 10px 16px;
      font-size: 14px; cursor: pointer; white-space: nowrap; transition: background 0.2s;
    }
    .btn-copy:hover { background: #c0001d; }
    .btn-copy.copied { background: #2a9d2a; }

    .cards-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px; margin-top: 24px;
    }
    .card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .card img { width: 100%; display: block; }
    .card-footer { padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; }
    .card-num { font-size: 12px; color: #999; }
    .btn-card-copy {
      background: #e60023; color: #fff; border: none;
      border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer;
    }
    .btn-card-copy.copied { background: #2a9d2a; }

    .pinterest-link {
      display: inline-block; background: #e60023; color: #fff;
      text-decoration: none; border-radius: 8px; padding: 12px 24px;
      font-size: 15px; margin-bottom: 20px;
    }
    .section-title { font-size: 16px; font-weight: 700; margin: 24px 0 12px; color: #222; }

    .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
    .tab-btn {
      padding: 8px 14px; border: 2px solid #e60023; border-radius: 8px;
      background: #fff; color: #e60023; font-size: 13px; cursor: pointer; transition: all 0.2s;
    }
    .tab-btn.active { background: #e60023; color: #fff; }

    .no-files {
      background: #fff8e1; border: 1px solid #ffd54f; border-radius: 10px;
      padding: 16px 20px; color: #795548; font-size: 14px; margin-top: 16px;
    }
    .no-files code { background: #f5f5f5; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  </style>
</head>

const NEED_UPLOAD = [];

function makeTabContent(key) {
  const h = HOLIDAYS[key];
  const needUpload = NEED_UPLOAD.includes(key) && h.files === null;

  let html = `
    <div class="section-title">Скопируй для каждого пина:</div>
    <div class="copy-block">
      <label>Название</label>
      <div class="copy-row">
        <div class="copy-text">${h.title}</div>
        <button class="btn-copy" onclick="copyThis(this,\`${h.title}\`)">Копировать</button>
      </div>
    </div>
    <div class="copy-block">
      <label>Описание + хэштеги</label>
      <div class="copy-row">
        <div class="copy-text">${h.desc}</div>
        <button class="btn-copy" onclick="copyThis(this,\`${h.desc}\`)">Копировать</button>
      </div>
    </div>
    <div class="copy-block">
      <label>Ссылка</label>
      <div class="copy-row">
        <div class="copy-text">${SITE}</div>
        <button class="btn-copy" onclick="copyThis(this,'${SITE}')">Копировать</button>
      </div>
    </div>
    <div class="copy-block">
      <label>Название доски</label>
      <div class="copy-row">
        <div class="copy-text">${h.board}</div>
        <button class="btn-copy" onclick="copyThis(this,\`${h.board}\`)">Копировать</button>
      </div>
    </div>`;

  if (needUpload) {
    html += `
    <div class="no-files">
      ⚠️ Открытки ещё не загружены на сервер.<br><br>
      Скопируй папку <code>${key}</code> на сервер в:<br>
      <code>/home/agent/khram-site/cards/${key}/</code><br><br>
      После этого они появятся здесь автоматически.
    </div>`;
  } else {
    html += `<div class="section-title">Открытки — нажми 📋 чтобы скопировать URL:</div>
    <div class="cards-grid" id="grid-${key}"></div>`;
  }

  return html;
}

// Создаём контент для всех табов
const content = document.getElementById('tabs-content');
Object.keys(HOLIDAYS).forEach((key, i) => {
  const div = document.createElement('div');
  div.id = 'tab-' + key;
  div.style.display = i === 0 ? '' : 'none';
  div.innerHTML = makeTabContent(key);
  content.appendChild(div);
});

// Строим сетки для праздников с файлами
function buildGrid(key) {
  const h = HOLIDAYS[key];
  if (!h.files) return;
  const grid = document.getElementById('grid-' + key);
  if (!grid) return;
  h.files.forEach((name, i) => {
    const url = h.base + name;
    const div = document.createElement('div');
    div.className = 'card';
    div.id = `grid-${key}-${i}`;
    div.innerHTML = `
      <img src="${url}" loading="lazy" alt="Открытка ${i+1}">
      <div class="card-footer">
        <span class="card-num">#${i+1}</span>
        <button class="btn-card-copy" onclick="copyCard(this,'${url}','${key}',${i})">📋 URL</button>
      </div>`;
    grid.appendChild(div);
  });
}

buildGrid('troitsa');
buildGrid('rod');
buildGrid('pasha');
buildGrid('preobrazenie');
buildGrid('uspeniye');
buildGrid('petra-pavla');
buildGrid('ioanna');

function switchTab(key) {
  Object.keys(HOLIDAYS).forEach(k => {
    document.getElementById('tab-' + k).style.display = k === key ? '' : 'none';
  });
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', Object.keys(HOLIDAYS)[i] === key);
  });
}

function copyThis(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ Скопировано';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
  });
}

function copyCard(btn, url, key, idx) {
  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = '✓ Готово';
    btn.classList.add('copied');
    document.getElementById(`grid-${key}-${idx}`).style.opacity = '0.4';
  });
}
